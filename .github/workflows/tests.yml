name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            device: linux
          - os: windows-latest
            device: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
            channel: 'stable'

      # Flutter Linux desktop builds (used by integration tests with
      # `-d linux`) need GTK3 + ninja. ubuntu-latest doesn't ship these
      # pre-installed; without them CMake fails with "gtk+-3.0 not found".
      - name: Install Linux desktop build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Pub get (workspace)
        run: flutter pub get

      # Run all package tests
      - name: Run all package tests
        run: |
          for dir in packages/*/; do
            if [ -d "$dir/test" ]; then
              echo "Testing $(basename $dir)..."
              cd "$dir"
              flutter pub get
              flutter test
              cd ../..
            fi
          done
        shell: bash

      # Run chenron unit tests
      - name: Run chenron unit tests
        working-directory: apps/chenron
        run: flutter test test/

      # Run chenron integration tests.
      # NOTE: each file is invoked separately. `flutter test integration_test/`
      # (batch mode) can't run more than one file per invocation on desktop
      # targets — the 2nd app process fails to attach to the debug socket
      # with "Error waiting for a debug connection: The log reader stopped
      # unexpectedly". Looping per-file dodges that.
      - name: Run chenron integration tests
        working-directory: apps/chenron
        run: |
          if [ -d "integration_test" ]; then
            for f in integration_test/*.dart; do
              echo "::group::$f"
              flutter test "$f" -d ${{ matrix.device }}
              echo "::endgroup::"
            done
          else
            echo "No integration_test directory, skipping."
          fi
        shell: bash
