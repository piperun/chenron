name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            device: linux
          - os: windows-latest
            device: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
            channel: 'stable'

      # Flutter Linux desktop builds (used by integration tests with
      # `-d linux`) need GTK3 + ninja to compile, and xvfb to provide
      # a virtual display to the binary `flutter test` launches.
      # ubuntu-latest is headless and ships none of these — without them:
      #  - missing libgtk-3-dev → CMake fails: "gtk+-3.0 not found"
      #  - missing xvfb        → launch fails: "Unable to start the app on the device"
      - name: Install Linux desktop build + display deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev xvfb

      - name: Pub get (workspace)
        run: flutter pub get

      # Run all package tests
      - name: Run all package tests
        run: |
          for dir in packages/*/; do
            if [ -d "$dir/test" ]; then
              echo "Testing $(basename $dir)..."
              cd "$dir"
              flutter pub get
              flutter test
              cd ../..
            fi
          done
        shell: bash

      # Run chenron unit tests
      - name: Run chenron unit tests
        working-directory: apps/chenron
        run: flutter test test/

      # Run chenron integration tests.
      # Each file is invoked separately — `flutter test integration_test/`
      # (batch mode) can't run more than one file per invocation on desktop
      # targets (the 2nd app process fails to attach to the debug socket).
      # On Linux, the spawned app needs a display: xvfb-run provides one.
      - name: Run chenron integration tests
        working-directory: apps/chenron
        run: |
          if [ -d "integration_test" ]; then
            # On ubuntu-latest the runner is headless; xvfb-run gives the
            # spawned Flutter Linux binary a virtual X display. On windows
            # we just call flutter directly.
            if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
              RUN_PREFIX="xvfb-run -a"
            else
              RUN_PREFIX=""
            fi
            for f in integration_test/*.dart; do
              echo "::group::$f"
              $RUN_PREFIX flutter test "$f" -d ${{ matrix.device }}
              echo "::endgroup::"
            done
          else
            echo "No integration_test directory, skipping."
          fi
        shell: bash
