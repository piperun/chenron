version: 0.6.0
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  app_logger: any
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
